<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butter!</title>
    <link href="./css/output.css" rel="stylesheet">
  </head>
  <body class="
    font-mono antialiased
    bg-white dark:bg-gray-900
  ">
    <header class="
      z-100 fixed top-0 inset-x-0 mr-[calc(100%-100vw)]
      flex h-14 items-center justify-between px-4 sm:px-8
      border-b border-gray-200
      bg-white text-black dark:bg-gray-800 dark:text-white
    ">
      <a class="h-8 flex gap-2 items-center" href="/">
        <img class="w-auto h-full" alt="Butter Icon" src="./images/butter.png" aria-hidden>
        <h1 class="text-3xl font-bold">Butter<span class="text-blue-400">!</span></h1>
      </a>
      <button class="size-8 text-4xl font-bold" aria-label="显隐列表" aria-expanded="false">≡</button>
    </header>
    <nav class="
      z-90 fixed left-0 h-full
      flex h-full items-center justify-between px-4 sm:px-8
      overflow-y-auto overscroll-contain
      border-r border-gray-200
      bg-white text-black dark:bg-gray-800 dark:text-white
    " aria-label="列表" hidden>
      <ul></ul>
    </nav>
    <main class="z-0 mt-14 px-4 py-2 sm:px-16 sm:py-8"></main>
    <footer class="
      text-center
      text-black dark:text-white
    ">
      <small>站长QQ：1744383119<br>🧈群：1044449627</small>
    </footer>
    <script>
      fetch("list.json")
        .then(response => {
          if (!response.ok) {
            throw new Error(response.status);
          }
          return response.json();
        })
        .then(data => {
          let main = "";
          let ul = "";
          
          for (const game of data) {
            main += `<article class="z-20 my-8 p-4 scroll-mt-15 border rounded border-gray-300 bg-white text-black dark:bg-gray-800 dark:text-white" id="${game['id']}"><h1 class="text-4xl">${game['title']}</h1><small>版本：${game['version']}<br>作者：${game['author']}</small><section class="my-4"><h2 class="text-2xl">截图：</h2><img alt="${game['id']}.png" src="./images/${game['id']}.png" loading="lazy"></section><section class="my-4"><h2 class="text-2xl">简介：</h2><p class="break-all">${game['introduction']}</p></section><section class="mt-4"><h2 class="text-2xl">下载：</h2><a class="mx-2" href="${game['download']['android']}" target="_blank">Android</a><a class="mx-2" href="${game['download']['windows']}" target="_blank">Windows</a></section></article>`;
            ul += `<li class="my-8 border-b border-gray-300"><a class="block" href="#${game['id']}">${game['title']}</a></li>`
          }

          document.querySelector("main").innerHTML = main;
          document.querySelector("ul").innerHTML = ul;
        })
        .catch(error => {
          console.error(error);
          window.alert(error.message);
        });

      document.addEventListener("click", (event) => {
        if (event.target.closest("a[href=\"#\"]")) {
          event.preventDefault();
          window.alert("该软件不支持此版本！");
        }
      });

      const nav = document.querySelector("nav");
      const button = document.querySelector("button");
      button.addEventListener("click", () => {
        nav.hidden = button.ariaExpanded === "true";
        button.ariaExpanded = !nav.hidden;
      });
      nav.addEventListener("click", (event) => {
        if (event.target.closest("a")) {
          nav.hidden = true;
          button.ariaExpanded = "false";
        }
      });
    </script>
  </body>
</html>
